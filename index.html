<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BloomMind</title>
    <script>
      // Capture beforeinstallprompt immediately, before any modules load
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('index.html early captured beforeinstallprompt');
        e.preventDefault();
        window.deferredPrompt = e;
        // Dispatch custom event in case front-end has already mounted
        window.dispatchEvent(new CustomEvent('pwa-prompt-available', { detail: e }));
      });
    </script>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e2b58" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BloomMind" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.jpg?v=3" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.jpg?v=3" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
